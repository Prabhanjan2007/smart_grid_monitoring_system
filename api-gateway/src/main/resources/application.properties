spring.application.name=api-gateway

server.port=8080

spring.cloud.gateway.server.webmvc.routes[0].id=transformer-service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/transformers/**

spring.cloud.gateway.server.webmvc.routes[1].id=sensor-service
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/sensors/**

spring.cloud.gateway.server.webmvc.routes[2].id=alert-service
spring.cloud.gateway.server.webmvc.routes[2].uri=http://localhost:8083
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/alerts/**

spring.cloud.gateway.server.webmvc.routes[3].id=maintenance-service
spring.cloud.gateway.server.webmvc.routes[3].uri=http://localhost:8084
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/maintenance/**

management.endpoints.web.exposure.include=*
management.endpoint.gateway.access=unrestricted